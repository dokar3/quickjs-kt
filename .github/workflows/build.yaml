name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    runs-on: ${{ matrix.os }}
    env:
      ORG_GRADLE_PROJECT_RELEASE_SIGNING_ENABLED: false

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Export GRAALVM_HOME
        shell: bash
        run: echo "GRAALVM_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      # Build system for C
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2.2

      # CMake generator
      - name: Setup ninja-build
        uses: seanmiddleditch/gha-setup-ninja@master

      # Cross-compile native libraries
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.12.0

      # Run js/ts scripts
      - name: Set Bun.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install multiplatform JDKs
        run: bun scripts/setupMultiplatformJdks.ts

      - uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for scripts
        if: runner.os != 'Windows'
        run: |
          chmod +x gradlew
          chmod +x quickjs/native/cmake/zig-ar.sh
          chmod +x quickjs/native/cmake/zig-ranlib.sh

      - name: Build
        run: |
          ./gradlew publishToMavenLocal
          ./gradlew build
